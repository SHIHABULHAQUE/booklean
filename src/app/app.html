@if (isLoading()) {
<div class="preloader">
    <div class="loader-content">
        <div class="infinity-wrap">
            <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="infGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#004fe1" />
                        <stop offset="50%" style="stop-color:#08a1f7" />
                        <stop offset="100%" style="stop-color:#09e0fe" />
                    </linearGradient>
                </defs>
                <path d="M25,12.5 C10,12.5 0,25 0,25 C0,25 10,37.5 25,37.5 C40,37.5 50,25 50,25 C50,25 60,12.5 75,12.5 C90,12.5 100,25 100,25 C100,25 90,37.5 75,37.5 C60,37.5 50,25 50,25 C50,25 40,12.5 25,12.5 Z" 
                      fill="none" 
                      stroke="url(#infGrad)" 
                      stroke-width="8" 
                      stroke-linecap="round"
                      class="infinity-path"/>
            </svg>
        </div>
        <div class="loading-text">
            <span>B</span><span>O</span><span>O</span><span>K</span><span>L</span><span>E</span><span>A</span><span>N</span>
        </div>
    </div>
</div>
}

<div class="app-content" [class.content-visible]="!isLoading()">
    <router-outlet></router-outlet>
</div>

<div class="cursor-dot" id="dot"></div>
<div class="cursor-ring" id="ring"></div>
