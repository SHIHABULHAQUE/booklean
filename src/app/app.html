@if (showLaunchLoader()) {
<div class="launch-loader" [class.launch-loader--exit]="launchExiting()" aria-label="BookLean loading">
    <div class="launch-loader__backdrop" aria-hidden="true"></div>

    <div class="launch-loader__stage">
        <div class="launch-loader__logo-wrap" aria-hidden="true">
            <img class="launch-loader__logo" src="assets/images/booklean-global-loader.svg" alt="" />
        </div>
    </div>
</div>
}

<div class="app-content" [class.content-visible]="!showLaunchLoader() || launchExiting()">
    <router-outlet></router-outlet>
</div>
