  </a>

  <button (click)="toggleChat()" class="chat-fab fab-lean">
    <div class="fab-dot"></div>
    <div class="bot-infinity">&infin;</div>
    @if (showBubble()) {
    <div class="fab-popup" [class.pop-anim]="showBubble()">
      Ask Lean Bot
      <div class="popup-arrow"></div>
    </div>
    }
  </button>
</div>

@if (isOpen()) {
<div class="lean-panel" [class.visible]="isOpen()">
  <div class="lean-hdr">
    <div class="lean-hdr-av">&infin;</div>
    <div class="lean-hdr-info">
      <div class="lean-hdr-name">Hey Lean &middot; LeanBot</div>
      <div class="lean-hdr-status">
        <div class="lean-hdr-dot"></div>
        Online &middot; Responds instantly
      </div>
    </div>
    <button (click)="toggleChat()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:18px;margin-left:auto;">&times;</button>
  </div>

  <div class="lean-msgs" #scrollContainer>
    @for (msg of messages(); track msg.time) {
      @if (msg.type === 'bot') {
        <div class="lean-bot-msg-wrap">
          <div class="lean-bot-av">&infin;</div>
          <div class="lean-bot-bubble" [innerHTML]="msg.text"></div>
        </div>
      } @else {
        <div class="lean-user-bubble">
          <div>{{msg.text}}</div>
        </div>
      }
    }
  </div>

  <div class="lean-quick">
    <button class="lean-quick-btn" (click)="sendMessage('Audit Compliance')">Audit Compliance</button>
    <button class="lean-quick-btn" (click)="sendMessage('VAT Filing')">VAT Filing</button>
    <button class="lean-quick-btn" (click)="sendMessage('Corporate Tax 9%')">Corporate Tax 9%</button>
  </div>

  <div class="lean-input-row">
    <input #chatInput class="lean-input" type="text" placeholder="Ask tax law, VAT, upload doc..." (keyup.enter)="sendMessage(chatInput.value); chatInput.value=''"/>
    <button class="lean-send" (click)="sendMessage(chatInput.value); chatInput.value=''">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>

  <div class="chat-footer">Powered by <strong>GPT-4o &middot; Claude 3</strong> &middot; UAE PDPL Compliant</div>
</div>
}
