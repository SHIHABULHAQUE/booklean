<header class="app-header glass-panel">
    <div class="header-container container">
        <a routerLink="/" class="logo">
            <img src="images/booklean-logo.png" alt="Booklean Logo" class="logo-image">
        </a>

        <!-- Desktop Nav -->
        <nav class="desktop-nav-pill">
            <a href="#about" class="nav-link">About</a>
            <a href="#services" class="nav-link">Services</a>
            <a href="#industries" class="nav-link">Industries</a>
            <a href="#leanbot" class="nav-link">LeanBot</a>
            <a href="#contact" class="nav-link">Contact</a>
        </nav>

        <div class="header-actions">
            <!-- Book Consultation Button -->
            <a href="#contact" class="btn-consultation">Book Consultation</a>

            <!-- Mobile Toggle -->
            <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle Menu">
                <span class="bar" [class.open]="isMenuOpen()"></span>
                <span class="bar" [class.open]="isMenuOpen()"></span>
                <span class="bar" [class.open]="isMenuOpen()"></span>
            </button>
        </div>
    </div>

    <!-- Mobile Nav Overlay -->
    @if (isMenuOpen()) {
    <nav class="mobile-nav">
        <a href="#about" class="nav-link" (click)="toggleMenu()">About</a>
        <a href="#services" class="nav-link" (click)="toggleMenu()">Services</a>
        <a href="#industries" class="nav-link" (click)="toggleMenu()">Industries</a>
        <a href="#leanbot" class="nav-link" (click)="toggleMenu()">LeanBot</a>
        <a href="#contact" class="nav-link" (click)="toggleMenu()">Contact</a>

        <a href="#contact" class="btn-consultation mobile-btn" (click)="toggleMenu()">Book Consultation</a>

    </nav>
    }
</header>
