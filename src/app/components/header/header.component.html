<header class="app-header glass-panel">
    <div class="header-container container">
        <a routerLink="/" class="logo">
            <div class="logo-icon-cube">📦</div>
            <span class="logo-text">BOOK<span>LEAN</span></span>
        </a>

        <!-- Desktop Nav -->
        <nav class="desktop-nav-pill">
            <a href="#about" class="nav-link">About</a>
            <a href="#services" class="nav-link active">Services</a>
            <a href="#technology" class="nav-link">Technology</a>
            <a href="#global" class="nav-link">Global</a>
        </nav>

        <div class="header-actions">
            <!-- Book Consultation Button -->
            <a href="#contact" class="btn-consultation">Book Consultation</a>

            <!-- Mobile Toggle -->
            <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle Menu">
                <span class="bar" [class.open]="isMenuOpen()"></span>
                <span class="bar" [class.open]="isMenuOpen()"></span>
                <span class="bar" [class.open]="isMenuOpen()"></span>
            </button>
        </div>
    </div>

    <!-- Mobile Nav Overlay -->
    @if (isMenuOpen()) {
    <nav class="mobile-nav">
        <a href="#about" class="nav-link" (click)="toggleMenu()">About</a>
        <a href="#services" class="nav-link" (click)="toggleMenu()">Services</a>
        <a href="#technology" class="nav-link" (click)="toggleMenu()">Technology</a>
        <a href="#global" class="nav-link" (click)="toggleMenu()">Global</a>

        <a href="#contact" class="btn-consultation mobile-btn" (click)="toggleMenu()">Book Consultation</a>

        <div class="mobile-region-selector">
            <span class="region-label">Region:</span>
            <div class="region-options">
                <a routerLink="/uk/home" routerLinkActive="active" class="region-pill" (click)="toggleMenu()">UK</a>
                <a routerLink="/in/home" routerLinkActive="active" class="region-pill" (click)="toggleMenu()">IN</a>
                <a routerLink="/uae/home" routerLinkActive="active" class="region-pill" (click)="toggleMenu()">UAE</a>
            </div>
        </div>
    </nav>
    }
</header>
