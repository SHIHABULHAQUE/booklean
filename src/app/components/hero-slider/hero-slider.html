<div class="hero">
    <div class="bg-slider">
        @for (img of bgImages; track $index) {
        <div class="bg-slide" [class.active]="currentSlide() === $index" [style.backgroundImage]="'url(' + img + ')'">
        </div>
        }
    </div>
    <div class="hero-grid"></div>
    <div class="hero-orb-1"></div>
    <div class="hero-orb-2"></div>

    <div class="hero-inner">
        <div class="hero-content">
            <div class="hero-text-slider">
                @for (slide of slidesText; track $index) {
                <div class="hero-text-slide" [class.active]="currentSlide() === $index">
                    <h1 [innerHTML]="slide.title"></h1>
                    <p class="hero-sub" [innerHTML]="slide.desc"></p>
                </div>
                }
            </div>

            <div class="hero-pills">
                <div class="hero-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path>
                        <path d="M22 4L12 14.01l-3-3"></path>
                    </svg>
                    99.5% Accuracy
                </div>
                <div class="hero-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    24h Close
                </div>
            </div>

            <div class="hero-actions">
                <a href="#contact" class="btn-primary" style="text-decoration: none;">Book Free Consultation</a>
                <a href="#services" class="btn-ghost" style="margin-left: 14px; text-decoration: none;">Explore Services</a>
            </div>

            <div class="hero-slider-dots">
                @for (dot of slidesText; track $index) {
                <div class="hero-dot" [class.active]="currentSlide() === $index" (click)="goToSlide($index)"></div>
                }
            </div>
        </div>

        <div class="hero-visual">
        </div>
    </div>
</div>
