<section class="services-section">
    <div class="section-wrap">
        <div class="section-header text-center">
            <span class="section-eyebrow">Financial Services</span>
            <h2 class="section-title serif">Comprehensive Financial <span class="hl">Intelligence</span></h2>
            <p class="section-sub mx-auto">End-to-end solutions designed to streamline your operations and accelerate
                growth across global markets.</p>
        </div>
        <div class="services-grid">
            @for (service of services; track service.id) {
            <div class="service-card">
                <div class="service-icon">{{ service.icon }}</div>
                <h3>{{ service.title }}</h3>
                <p>{{ service.description }}</p>
            </div>
            }
        </div>
    </div>
</section>
